spring:
  r2dbc:
    url: r2dbc:mysql://${URL}:${PORT}/${DB_NAME}?${URL_VALUES}
    username: ${USER_DB_USERNAME}
    password: ${USER_DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      max-create-connection-time: 10s
      validation-query: SELECT 1

server:
  port: 8090
  # Permite que Spring resuelva correctamente los headers de proxy (X-Forwarded-*)
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
    # URL base del servidor público (CloudFront). Cambia este valor si cambia la distribución.
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: franchise
        url: /v3/api-docs?group=franchise
      - name: branch
        url: /v3/api-docs?group=branch
      - name: product
        url: /v3/api-docs?group=product
  # Necesario para que springdoc no redirija a http interno sino a la ruta relativa
  use-management-port: false
  cache:
    disabled: true
